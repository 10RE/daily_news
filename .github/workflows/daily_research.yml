name: Daily Research Briefing

on:
  schedule:
    # 每周二四北京时间 8:00 (UTC 0:00)
    - cron: '0 0 * * 1,4'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python daily_research.py

      - name: Commit report
        run: |
          git config user.name "Research Bot"
          git config user.email "bot@research.local"
          git add reports/
          git diff --cached --quiet || git commit -m "📰 $(date +%Y-%m-%d) 每日研究简报"
          git push || echo "Push skipped (no changes or conflict)"
